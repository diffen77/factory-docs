name: Deploy Factory Docs
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: [self-hosted, wsl2]
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: diffen77
          password: ${{ secrets.PROJECT_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/diffen77/factory-docs:latest,ghcr.io/diffen77/factory-docs:${{ github.sha }}
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 192.168.99.4
          username: diffen
          key: ${{ secrets.SSH_DEPLOY_KEY }}
          script: |
            docker pull ghcr.io/diffen77/factory-docs:latest
            docker stop factory-docs || true
            docker rm factory-docs || true
            docker run -d --name factory-docs --restart unless-stopped -p 8888:3000 ghcr.io/diffen77/factory-docs:latest
